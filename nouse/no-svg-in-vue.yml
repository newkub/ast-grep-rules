id: no-svg-in-vue
message: In Nuxt projects with @nuxt/icon, use <Icon> component instead of <svg> elements. Replace with <Icon name="mdi-icon-name" />.
severity: warning
language: vue
rule:
  kind: element
  pattern: <svg $$$>
  inside:
    kind: template_element
    inside:
      kind: vue_single_file_component
files:
  - '**/*.vue'
ignores:
  - 'node_modules/**'
  - '.nuxt/**'
  - '.output/**'
  - 'dist/**'

id: components-import-ui
message: All components must import from components/ui directory only.
severity: warning
language: typescript
rule:
  any:
    - pattern: |
        import $COMPONENT from '@/components/$PATH'
      not:
        pattern: |
          import $COMPONENT from '@/components/ui/$PATH'
    - pattern: |
        import $COMPONENT from '../$PATH'
      not:
        pattern: |
          import $COMPONENT from '../ui/$PATH'
fix: |
  import $COMPONENT from '@/components/ui/$COMPONENT'
files:
  - "components/**/*.vue"

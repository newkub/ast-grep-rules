id: composables-import-types
message: All composables must import types and refactor interfaces to appropriate locations.
severity: warning
language: typescript
rule:
  any:
    - pattern: |
        import $IMPORTS from '$PATH'
      not:
        any:
          - pattern: |
              import type { $TYPES } from '$PATH'
          - pattern: |
              import { $TYPES } from '#shared/types/$PATH'
fix: |
  import type { $TYPES } from '#shared/types/$PATH'
files:
  - "composables/**/*.ts"

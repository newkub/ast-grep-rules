id: nuxt-tsconfig-references
language: json
rule:
  pattern:
    context: |
      {
        "files": [],
        "references": $REFS
      }
  not:
    pattern: |
      {
        "path": "./.nuxt/tsconfig.app.json"
      }
severity: error
message: |
  Nuxt project tsconfig.json must include all 4 .nuxt references:
  - .nuxt/tsconfig.app.json
  - .nuxt/tsconfig.server.json
  - .nuxt/tsconfig.shared.json
  - .nuxt/tsconfig.node.json
  
  Expected structure:
  {
    "files": [],
    "references": [
      { "path": "./.nuxt/tsconfig.app.json" },
      { "path": "./.nuxt/tsconfig.server.json" },
      { "path": "./.nuxt/tsconfig.shared.json" },
      { "path": "./.nuxt/tsconfig.node.json" }
    ]
  }
files:
  - tsconfig.json

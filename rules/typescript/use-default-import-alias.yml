id: use-default-import-alias
message: Use default import alias for all imports in .vue and .ts files.
severity: warning
language: typescript
rule:
  pattern: |
    import { $NAMED_IMPORTS } from '$PATH'
  not:
    pattern: |
      import $ALIAS from '$PATH'
fix: |
  import $ALIAS from '$PATH'
files:
  - "**/*.vue"
  - "**/*.ts"

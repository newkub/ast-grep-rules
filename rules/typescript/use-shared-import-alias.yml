id: use-shared-import-alias
message: Use #shared import alias for shared imports instead of relative paths.
severity: warning
language: typescript
rule:
  pattern: |
    import $IMPORTS from '$PATH'
  regex: '\.\./\.\./shared/|\.\./shared/|shared/'
  not:
    pattern: |
      import $IMPORTS from '#shared/$PATH'
fix: |
  import $IMPORTS from '#shared/$PATH'
files:
  - "**/*.ts"
  - "**/*.vue"
